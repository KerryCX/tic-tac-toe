<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Tic-Tac-Toe</title>
    <meta name="viewport" content="width=device-width" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <main>
      <h1 class="game-heading">Tic Tac Toe</h1>
      <p id="message" aria-live="polite">X goes first!</p>
      <div class="game-layout">
        <div class="mode-controls">
          <div class="mode-toggle">
            <button class="mode-btn mode-btn--active" id="btn-hvh">
              Human vs Human
            </button>
            <button class="mode-btn" id="btn-hvc">Human vs Computer</button>
          </div>
          <div class="hidden" id="difficulty-controls">
            <div class="mode-toggle">
              <button class="mode-btn mode-btn--active" id="btn-easy">
                Easy
              </button>
              <button class="mode-btn" id="btn-hard">Hard</button>
            </div>
            <div class="mode-toggle">
              <button class="mode-btn mode-btn--active" id="btn-x">
                Play as X
              </button>
              <button class="mode-btn" id="btn-o">Play as O</button>
            </div>
          </div>
          <button class="reset-button">Start Again</button>
        </div>
        <div class="section-container">
          <section class="grid-container" aria-label="Game board">
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
            <div class="square"></div>
          </section>
        </div>
      </div>
    </main>
  </body>
</html>
